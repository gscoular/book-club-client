
<mat-card>
    <ng-container *ngIf="(book$ | async) as book">
        <mat-card-title>
            {{ book.title }} - {{ book.author }}
        </mat-card-title>
        <mat-card-subtitle>
            Selected by Grant
        </mat-card-subtitle>
        <mat-card-content>
            <img src="{{ book.imageUrl }}">
            {{ book.description }}
        </mat-card-content>
    </ng-container>

</mat-card>
